<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Circle explorer: radius, diameter, circumference, area</title>
<style>
  body {
    margin: 0;
    padding: 32px;
    background: #191919;
    color: #e6e6e4;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  .wrap { display: flex; gap: 32px; align-items: center; flex-wrap: wrap; max-width: 560px; margin: 0 auto; }
  .stat { background: #2f2f2f; border-radius: 8px; padding: 16px; }
  .stat p:first-child { font-size: 13px; color: #9b9b9b; margin: 0 0 4px; }
  .stat p:last-child { font-size: 20px; font-weight: 600; margin: 0; }
  .grid { flex: 1; min-width: 220px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid .span2 { grid-column: span 2; }
  label { font-size: 14px; color: #9b9b9b; min-width: 50px; }
  input[type=range] { flex: 1; accent-color: #9b9b9b; }
  #r-out { font-size: 14px; font-weight: 600; min-width: 40px; text-align: right; }
  .slider-row { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
</style>
</head>
<body>
<div class="wrap">
  <svg width="220" height="220" viewBox="0 0 220 220" style="flex-shrink:0;">
    <circle id="circ" cx="110" cy="110" r="80" fill="none" stroke="#7f77dd" stroke-width="2"/>
    <line id="rline" x1="110" y1="110" x2="190" y2="110" stroke="#e6e6e4" stroke-width="1.5"/>
    <circle cx="110" cy="110" r="3" fill="#e6e6e4"/>
  </svg>
  <div style="flex:1; min-width:220px;">
    <div class="slider-row">
      <label>Radius</label>
      <input type="range" min="10" max="100" step="1" value="80" id="radius"/>
      <span id="r-out">80</span>
    </div>
    <div class="grid">
      <div class="stat"><p>Diameter</p><p id="d-out">160</p></div>
      <div class="stat"><p>Circumference</p><p id="c-out">502.65</p></div>
      <div class="stat span2"><p>Area</p><p id="a-out">20106.19</p></div>
    </div>
  </div>
</div>
<script>
const slider = document.getElementById('radius');
const circ = document.getElementById('circ');
const rline = document.getElementById('rline');
function update(r) {
  const scale = 80 / 100;
  const drawR = r * scale;
  circ.setAttribute('r', drawR);
  rline.setAttribute('x2', 110 + drawR);
  document.getElementById('r-out').textContent = r;
  document.getElementById('d-out').textContent = (r*2).toFixed(0);
  document.getElementById('c-out').textContent = (2*Math.PI*r).toFixed(2);
  document.getElementById('a-out').textContent = (Math.PI*r*r).toFixed(2);
}
slider.addEventListener('input', e => update(Number(e.target.value)));
update(80);
</script>
</body>
</html>
